<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cohort Details - CohortHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='/views/dashboard.html'" style="cursor: pointer;">
            CohortHub
        </div>
        <div class="nav-links">
            <a href="/views/dashboard.html" class="nav-link">Dashboard</a>
            <a href="/views/courses.html" class="nav-link">Browse Courses</a>
            <a href="/views/certificate.html" class="nav-link">My Certificates</a>
        </div>
        <div class="nav-user">
            <span id="userDisplay"></span>
            <button id="logoutBtn" class="btn-danger">Sign Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <button onclick="window.location.href='/views/dashboard.html'" class="btn-secondary" style="width: auto; margin-bottom: 1.5rem;">
            ← Back to Dashboard
        </button>

        <div id="cohortHeader"></div>

        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <button id="modulesTab" class="tab-btn active" onclick="switchTab('modules')">Modules</button>
            <button id="discussionsTab" class="tab-btn" onclick="switchTab('discussions')">Discussions</button>
            <button id="announcementsTab" class="tab-btn" onclick="switchTab('announcements')">Announcements</button>
        </div>

        <div id="modulesList" class="cohorts-grid"></div>
        <div id="discussionsList" style="display: none;"></div>
        <div id="announcementsList" style="display: none;"></div>
    </div>

    
<div id="modulesList" class="cohorts-grid">
    
</div>


<div id="emptyModulesMessage" style="display: none; text-align: center; padding: 3rem; background: var(--card); border-radius: 12px; border: 2px dashed var(--border);">
    <p style="font-size: 1.25rem; color: var(--text-secondary); margin-bottom: 0.5rem;">📚 No Modules Yet</p>
    <p style="color: var(--text-muted);">This course content is being prepared. Check back soon!</p>
</div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cohort.js"></script>
</body>
</html>
