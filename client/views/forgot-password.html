<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CohortHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">CohortHub</div>
            <h1>Forgot Password</h1>
            <p class="auth-subtitle">Enter your email to receive a password reset link</p>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div id="message" class="success-message" style="display: none;"></div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn-primary">Send Reset Link</button>
            </form>
            
            <p class="auth-footer">
                <a href="/views/login.html">Back to Login</a>
            </p>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('forgotPasswordForm');
            const message = document.getElementById('message');
            const errorMessage = document.getElementById('errorMessage');
            
            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                
                message.style.display = 'none';
                errorMessage.style.display = 'none';
                
                const email = document.getElementById('email').value.trim();
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';
                
                try {
                    const response = await fetch('/api/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        message.style.display = 'block';
                        message.textContent = 'Password reset link sent! Check your email.';
                        submitBtn.textContent = 'Email Sent ✓';
                    } else {
                        errorMessage.style.display = 'block';
                        errorMessage.textContent = data.message || 'Something went wrong';
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    }
                } catch (error) {
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = 'Network error. Please try again.';
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
