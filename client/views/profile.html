<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - CohortHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='/views/dashboard.html'" style="cursor: pointer;">
            CohortHub
        </div>
        <div class="nav-links">
            <a href="/views/dashboard.html" class="nav-link">Dashboard</a>
            <a href="/views/courses.html" class="nav-link">Browse Courses</a>
            <a href="/views/certificate.html" class="nav-link">My Certificates</a>
        </div>
        <div class="nav-user">
            <span id="userDisplay"></span>
            <button id="logoutBtn" class="btn-danger">Sign Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <button onclick="window.location.href='/views/dashboard.html'" class="btn-secondary" style="width: auto; margin-bottom: 1.5rem;">
            ← Back to Dashboard
        </button>

        <h1>My Profile</h1>
        <div id="profileContent" style="background: var(--card); border-radius: 12px; padding: 2rem; box-shadow: var(--shadow); max-width: 600px; margin-top: 1rem; border: 1px solid var(--border);"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
