<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Content - CohortHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='/views/dashboard.html'" style="cursor: pointer;">
            CohortHub Admin
        </div>
        <div class="nav-links">
            <a href="/views/admin.html" class="nav-link">Users</a>
            <a href="/views/admin-content.html" class="nav-link active">Content</a>
        </div>
        <div class="nav-user">
            <span id="userDisplay"></span>
            <button id="logoutBtn" class="btn-danger">Sign Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <h1>Manage Module Content</h1>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
            Add video, text, code, images, and PDF content to modules
        </p>

        <div id="messageArea"></div>

        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div class="form-group">
                <label for="cohortSelect">Select Cohort</label>
                <select id="cohortSelect" onchange="loadModules()">
                    <option value="">-- Select a cohort --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="moduleSelect">Select Module</label>
                <select id="moduleSelect" onchange="loadContentBlocks()">
                    <option value="">-- Select a module --</option>
                </select>
            </div>
        </div>

        
        <div id="addContentForm" style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem;">
            <h2 style="margin-bottom: 1rem;">Add Content Block</h2>
            <form id="contentForm">
                <div class="form-group">
                    <label for="blockType">Content Type</label>
                    <select id="blockType" required>
                        <option value="text">Text</option>
                        <option value="video">Video (YouTube)</option>
                        <option value="code">Code</option>
                        <option value="image">Image</option>
                        <option value="pdf">PDF</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="blockTitle">Title (optional)</label>
                    <input type="text" id="blockTitle" placeholder="e.g., Introduction to HTML">
                </div>
                <div class="form-group" id="contentField">
                    <label for="blockContent">Content</label>
                    <textarea id="blockContent" rows="4" placeholder="Enter content or URL..."></textarea>
                </div>
                <div class="form-group" id="fileUrlField" style="display: none;">
                    <label for="fileUrl">File URL</label>
                    <input type="text" id="fileUrl" placeholder="https://example.com/file.pdf">
                </div>
                <button type="submit" class="btn-primary">Add Content</button>
            </form>
        </div>

        
        <h2 style="margin-bottom: 1rem;">Content Blocks</h2>
        <div id="contentBlocksList"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const user = checkAuth();
            if (!user || !['admin', 'instructor'].includes(user.role)) {
                alert('Access denied. Admin or Instructor only.');
                window.location.href = '/views/dashboard.html';
                return;
            }

            document.getElementById('userDisplay').textContent = `${user.firstName} ${user.lastName}`;
            document.getElementById('logoutBtn').addEventListener('click', function () {
                api.logout();
            });

            await loadCohorts();

            
            document.getElementById('blockType').addEventListener('change', function() {
                const type = this.value;
                const contentField = document.getElementById('contentField');
                const fileUrlField = document.getElementById('fileUrlField');
                
                if (type === 'image' || type === 'pdf') {
                    contentField.style.display = 'none';
                    fileUrlField.style.display = 'block';
                } else {
                    contentField.style.display = 'block';
                    fileUrlField.style.display = 'none';
                }
            });

            
            document.getElementById('contentForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                await addContentBlock();
            });
        });

        async function loadCohorts() {
            try {
                const response = await api.getMyCohorts();
                const cohorts = response.data.cohorts || [];
                const select = document.getElementById('cohortSelect');
                
                select.innerHTML = '<option value="">-- Select a cohort --</option>';
                cohorts.forEach(cohort => {
                    select.innerHTML += `<option value="${cohort.id}">${cohort.name}</option>`;
                });
            } catch (error) {
                showMessage('Failed to load cohorts: ' + error.message, 'error');
            }
        }

        async function loadModules() {
            const cohortId = document.getElementById('cohortSelect').value;
            if (!cohortId) return;
            
            try {
                const response = await api.getModules(cohortId);
                const modules = response.data.modules || [];
                const select = document.getElementById('moduleSelect');
                
                select.innerHTML = '<option value="">-- Select a module --</option>';
                modules.forEach(module => {
                    select.innerHTML += `<option value="${module.id}">${module.title}</option>`;
                });
            } catch (error) {
                showMessage('Failed to load modules: ' + error.message, 'error');
            }
        }

        async function loadContentBlocks() {
            const moduleId = document.getElementById('moduleSelect').value;
            if (!moduleId) {
                document.getElementById('contentBlocksList').innerHTML = '';
                return;
            }
            
            try {
                const response = await api.getModule(moduleId);
                const blocks = response.data.contentBlocks || [];
                const container = document.getElementById('contentBlocksList');
                
                if (blocks.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary);">No content blocks yet.</p>';
                    return;
                }
                
                container.innerHTML = blocks.map((block, index) => `
                    <div class="cohort-card" style="margin-bottom: 0.5rem; border-left: 4px solid var(--accent);">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>#${index + 1}: ${block.title || block.block_type}</strong>
                                <span class="status-badge active" style="font-size: 0.6rem; margin-left: 0.5rem;">${block.block_type}</span>
                            </div>
                            <button onclick="deleteBlock('${block.id}')" class="btn-danger" style="font-size: 0.7rem;">Delete</button>
                        </div>
                        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem;">
                            ${block.content ? block.content.substring(0, 100) + (block.content.length > 100 ? '...' : '') : 'No content'}
                        </p>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('Failed to load content: ' + error.message, 'error');
            }
        }

        async function addContentBlock() {
            const moduleId = document.getElementById('moduleSelect').value;
            const blockType = document.getElementById('blockType').value;
            const title = document.getElementById('blockTitle').value;
            const content = document.getElementById('blockContent').value;
            const fileUrl = document.getElementById('fileUrl').value;
            
            if (!moduleId) {
                showMessage('Please select a module first.', 'error');
                return;
            }
            
            try {
                await api.createContentBlock(moduleId, {
                    blockType,
                    title,
                    content: blockType === 'image' || blockType === 'pdf' ? '' : content,
                    fileUrl: blockType === 'image' || blockType === 'pdf' ? (fileUrl || content) : null
                });
                
                showMessage('Content added successfully!', 'success');
                document.getElementById('contentForm').reset();
                await loadContentBlocks();
            } catch (error) {
                showMessage('Failed to add content: ' + error.message, 'error');
            }
        }

        async function deleteBlock(blockId) {
            if (!confirm('Are you sure you want to delete this content block?')) return;
            
            try {
                await api.deleteContentBlock(blockId);
                showMessage('Content deleted.', 'success');
                await loadContentBlocks();
            } catch (error) {
                showMessage('Failed to delete: ' + error.message, 'error');
            }
        }

        function showMessage(message, type) {
            const area = document.getElementById('messageArea');
            area.innerHTML = `
                <div class="${type === 'success' ? 'success-message' : 'error-message'}" style="margin-bottom: 1rem;">
                    ${message}
                </div>
            `;
            setTimeout(() => { area.innerHTML = ''; }, 4000);
        }
    </script>
</body>
</html>
